# nginx.conf

server {
  # Listen on port 8080, the default for Cloud Run
  listen 8080;

  # Set the root directory for serving files
  root /usr/share/nginx/html;

  # Set the default file to serve
  index index.html;

  # This setting is crucial for single-page applications.
  # It ensures that if a user refreshes a page or navigates directly to a URL
  # like /prayer/kidan, Nginx will serve index.html, allowing your
  # client-side JavaScript routing to handle the request.
  location / {
    try_files $uri $uri/ /index.html;
  }
}